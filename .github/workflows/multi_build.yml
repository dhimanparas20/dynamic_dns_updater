name: Build and push for both x86_64 and arm64

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image owner (lowercase for GHCR)
        shell: bash
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      # -------------------------------
      # Setup emulation + builder
      # -------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------
      # Login to Docker Hub
      # -------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------------
      # Login to GitHub Container Registry (GHCR)
      # -------------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      # -------------------------------
      # Build and Push for x86_64
      # -------------------------------
      - name: Build and push (x86_64) to Docker Hub + GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ddns:x86_64
            ghcr.io/${{ env.OWNER_LC }}/ddns:x86_64
          cache-from: type=gha,scope=ddns-amd64
          cache-to: type=gha,mode=max,scope=ddns-amd64

      # -------------------------------
      # Build and Push for arm64
      # -------------------------------
      - name: Build and push (arm64) to Docker Hub + GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ddns:arm64
            ghcr.io/${{ env.OWNER_LC }}/ddns:arm64
          cache-from: type=gha,scope=ddns-arm64
          cache-to: type=gha,mode=max,scope=ddns-arm64

      # -------------------------------
      # Create multi-arch "latest" tag pointing to the arch-specific tags
      # -------------------------------
      - name: Create and push multi-arch manifest (Docker Hub)
        run: |
          docker buildx imagetools create \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ddns:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/ddns:x86_64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/ddns:arm64

      - name: Create and push multi-arch manifest (GHCR)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.OWNER_LC }}/ddns:latest \
            ghcr.io/${{ env.OWNER_LC }}/ddns:x86_64 \
            ghcr.io/${{ env.OWNER_LC }}/ddns:arm64
