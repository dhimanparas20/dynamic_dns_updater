name: Build and push for both x86_64 and arm64

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------
      # Login to Docker Hub
      # -------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------------
      # Login to GitHub Container Registry (GHCR)
      # -------------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MY_GITHUB_TOKEN }}

      # -------------------------------
      # Build and Push for x86_64
      # -------------------------------
      - name: Build and Push Docker image to both registries
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ddns:x86_64
            ghcr.io/${{ github.repository_owner }}/ddns:x86_64

      # -------------------------------
      # Build and Push for arm64
      # -------------------------------
      - name: Build and Push Docker image to both registries
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ddns:arm64
            ghcr.io/${{ github.repository_owner }}/ddns:arm64      
